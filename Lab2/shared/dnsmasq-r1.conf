# DHCP only on LAN (Rede A)
interface=eth0
bind-interfaces

# Pool for Rede A (192.168.1.0/24)
dhcp-range=192.168.1.100,192.168.1.200,255.255.255.0,12h

# Default gateway (router) for clients
dhcp-option=3,192.168.1.1

# DNS server offered to clients
dhcp-option=6,8.8.8.8

# Good defaults for a lab
dhcp-authoritative
log-dhcp